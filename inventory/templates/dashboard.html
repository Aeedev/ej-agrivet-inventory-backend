<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<nav class="bg-green-700 text-white p-4 flex justify-between">
  <h1 class="font-bold text-lg">EJ Agri-Vet System</h1>
  <div>
    <a href="/" class="mr-4">Dashboard</a>
    <a href="/products/" class="mr-4">Products</a>
    <a href="/sales/">Sales</a>
  </div>
</nav>

<div class="p-6">

  <h2 class="text-2xl font-bold mb-6">Dashboard</h2>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

    <div class="bg-white p-6 rounded shadow">
      <h3 class="text-gray-500">Total Products</h3>
      <p class="text-3xl font-bold">{{ total_products }}</p>
    </div>

    <div class="bg-white p-6 rounded shadow">
      <h3 class="text-gray-500">Low Stock</h3>
      <p class="text-3xl font-bold text-red-500">{{ low_stock }}</p>
    </div>

    <div class="bg-white p-6 rounded shadow">
      <h3 class="text-gray-500">Total Revenue</h3>
      <p class="text-3xl font-bold text-green-600">₱{{ total_revenue }}</p>
    </div>

  </div>

</div>

</body>
</html>
