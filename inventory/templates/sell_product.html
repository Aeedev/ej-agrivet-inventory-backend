<!DOCTYPE html>
<html>
<head>
  <title>Sell Product</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-bold mb-6">Sell Product</h1>

<div class="bg-white p-6 rounded-xl shadow max-w-md">

  <h2 class="text-lg font-bold">{{ product.name }}</h2>
  <p class="text-gray-500">Stock: {{ product.quantity }}</p>

  <form method="POST" class="mt-4">
    {% csrf_token %}

    <input name="quantity" type="number" placeholder="Quantity to sell"
      class="w-full border p-2 mb-3 rounded" required>

    <button class="bg-green-600 text-white px-4 py-2 rounded w-full hover:bg-green-700">
      Confirm Sale
    </button>
  </form>

</div>

</body>
</html>
